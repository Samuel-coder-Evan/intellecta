services:
  - type: web
    name: intellecta-api
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: intellecta-db
          property: connectionString
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://intellecta.co.in

  - type: web
    name: intellecta-frontend
    env: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: intellecta-db
    region: singapore
    plan: free
    databaseName: intellecta
    user: intellecta_user
